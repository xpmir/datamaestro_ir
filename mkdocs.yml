# Configuration

site_name: Text Datasets
repo_url: https://github.com/bpiwowar/datamaestro_ir

# Main pages
nav:
  - Home: index.md
  - API:
    - General: api.md
    - Information Retrieval: api/ir.md


# Automatic page generation for datasets
plugins:
  - datamaestro:
      repository: text
  - experimaestro:
      modules:
        - api/ir.md: [datamaestro_ir.data.ir]
        - api.md: [datamaestro_ir]
  - search

# Theme
theme:
    name: readthedocs
    highlightjs: true
    collapse_navigation: true
